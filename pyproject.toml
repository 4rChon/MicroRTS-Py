[project]
name = "gym-microrts"
version = "0.1.0"
description = ""
authors = [{name = "Costa Huang", email = "costa.huang@outlook.com"}]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "peewee>=3.14.8",
    "PettingZoo>=1.16.0",
    "jpype1>=1.5.0",
    "gymnasium>=0.29.1",
    "numpy<2",
    "pillow>=12.1.1",
]

[project.optional-dependencies]
spyder = ["spyder>=5.1.5"]
dev = [
    "tensorboard>=2.17.0",
    "wandb>=0.12.1",
    "trueskill>=0.4.5",
    "stable-baselines3>=2.3.2",
    "torch>=2.4.0",
    "torchvision>=0.19.0",
    "torchaudio>=2.4.0",
    "pytest>=6.2.5",
    "pre-commit>=2.17.0",
]

[tool.uv]
index-url = "https://pypi.org/simple"

[[tool.uv.index]]
name = "pytorch-gpu"
url = "https://download.pytorch.org/whl/cu124"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-gpu" }
torchvision = { index = "pytorch-gpu" }
torchaudio = { index = "pytorch-gpu" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
exclude = [
    "gym_microrts/microrts/build/*",
    "gym_microrts/microrts/resources",
    "gym_microrts/microrts/src",
    "gym_microrts/microrts/data",
    "gym_microrts/microrts/lib/*.jar",
]
